server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework

  compression:
    enabled: true
    mime-types:
      - application/json
      - application/xml
      - text/xml
      - text/html
      - text/plain
    min-response-size: 2KB

spring:
  main:
    web-application-type: reactive
  http:
    codecs:
      max-in-memory-size: 10MB

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 5000
            response-timeout: 10s
            pool:
              type: elastic
              max-connections: 500
              acquire-timeout: 30000
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/service/productservice/**
              filters:
                - StripPrefix=2

          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - http://localhost:3000
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - gateway
          - prometheus

  endpoint:
    health:
      show-details: when_authorized

  health:
    defaults:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
  
  opentelemetry:
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
        schedule-delay: 1s
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
          
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
          
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    "[org.springframework.cloud.gateway]": INFO
    "[org.springframework.web]": INFO
    "[reactor.netty]": INFO
    "[org.springframework.cloud.gateway.handler.predicate]": TRACE
    "[reactor.netty.http.client]": DEBUG


info:
  application:
    name: API Gateway
    description: Enterprise API Gateway
    version: 1.0.0