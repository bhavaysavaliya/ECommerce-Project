receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
  otlphttp/loki:
    endpoint: "http://localhost:3100/otlp"
  otlp/jaeger:
    endpoint: 127.0.0.1:4319
    tls:
      insecure: true
  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    logs:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - debug
        - otlphttp/loki
    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - debug
        - otlp/jaeger
    metrics:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - debug
        - prometheus